plugins {
    id 'java'
    id 'maven-publish'
    id 'com.jfrog.artifactory' version '5.2.5' // 최신 8.x 환경 호환용 플러그인 고정
}

group = 'org.springframework'
version = '0.1.0'

// 사용 중이신 Java 21 환경 사양 강제 매핑
java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenCentral()
}

dependencies {
    implementation("org.springframework.boot:spring-boot-starter-web:3.3.5")
    testImplementation("org.springframework.boot:spring-boot-starter-test:3.3.5")
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}

// 젠킨스 쉘 명령어로부터 계정 정보를 안전하게 수신하기 위한 사양 바인딩
artifactory {
    contextUrl = "jfrog.io" // 정식 업로드 API 엔드포인트 도메인 입력
    publish {
        repository {
            repoKey = 'brainshin-gradle-dev-local'           // 실제 JFrog 타겟 저장소 명칭
            username = "${artifactory_user}"                 // Jenkinsfile에서 전달받는 변수
            password = "${artifactory_password}"             // Jenkinsfile에서 전달받는 변수
            maven = true
        }
        defaults {
            publications('mavenJava')
        }
    }
}
