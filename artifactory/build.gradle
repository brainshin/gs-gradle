plugins {
    id 'java'
    id 'maven-publish'
}

group = 'org.springframework'
version = '0.1.0'

sourceCompatibility = 1.8
targetCompatibility = 1.8

repositories {
    mavenCentral()
}

dependencies {
    compile("org.springframework.boot:spring-boot-starter-web:2.1.18.RELEASE")
    testCompile("org.springframework.boot:spring-boot-starter-test:2.1.18.RELEASE")
}

// 젠킨스가 가져가서 배포할 수 있도록 표준 배포 양식만 남겨둡니다.
publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}
